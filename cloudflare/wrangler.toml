name = "teams-monitor-cron"
main = "worker.js"
compatibility_date = "2025-09-01"

# Daily trigger. 13:15 UTC fires this Worker about 5 minutes before the
# user-facing "available by 7:30 AM Mountain" target, giving comfortable
# slack for workflow runtime + GitHub Pages deploy.
#
#   13:15 UTC = 7:15 AM MDT = 6:15 AM MST
#
# Cloudflare cron is UTC-only. DST drift to ~6:15 AM in winter matches the
# pattern already documented in .github/workflows/daily.yml.
[triggers]
crons = ["15 13 * * *"]

[vars]
GITHUB_REPO = "d-scott-code/teams-production-monitor"
WORKFLOW_FILE = "daily.yml"
WORKFLOW_REF = "main"

# Required secret (set via `wrangler secret put`, never committed):
#   GITHUB_TOKEN   fine-grained PAT, Actions: read+write on this repo only
