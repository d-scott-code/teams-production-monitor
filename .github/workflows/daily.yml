name: Daily Teams Production Monitor

# Schedule. GitHub Actions cron is UTC-only. We run two slots ~20 minutes
# apart so the backup catches anything the primary misses (the :00 UTC slot
# was getting skipped under platform load; see scripts/run_daily.py for the
# idempotency guard that makes the second slot a no-op when the first lands).
#
#   Primary (13:20 UTC):   7:20 AM MDT / 6:20 AM MST
#   Backup  (13:40 UTC):   7:40 AM MDT / 6:40 AM MST
#
# DST shifts mean winter runs ~1 hour earlier in local time. Acceptable for
# a daily ops report.
on:
  schedule:
    - cron: "20 13 * * *"
    - cron: "40 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet --disable-pip-version-check requests anthropic

      - name: Run daily briefing
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_USER_UPN: ${{ secrets.GRAPH_USER_UPN }}
        run: python3 scripts/run_daily.py
