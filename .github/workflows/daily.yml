name: Daily Teams Production Monitor

# Schedule. The primary trigger is a Cloudflare Worker that calls the
# workflow_dispatch API at 13:15 UTC daily (see cloudflare/README.md) —
# workflow_dispatch isn't subject to the cron queueing that routinely
# delays GitHub-scheduled events by hours.
#
# These cron entries are a fallback. If the Worker is misconfigured or
# Cloudflare has an outage, GitHub's scheduler will still eventually fire
# this workflow (late). The run_daily.py idempotency guard prevents
# duplicate reports on days when both trigger paths succeed.
#
#   Fallback primary (13:20 UTC):   7:20 AM MDT / 6:20 AM MST
#   Fallback backup  (13:40 UTC):   7:40 AM MDT / 6:40 AM MST
#
# DST shifts mean winter runs ~1 hour earlier in local time. Acceptable
# for a fallback that's only used when the Worker is broken.
on:
  schedule:
    - cron: "20 13 * * *"
    - cron: "40 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet --disable-pip-version-check requests anthropic

      - name: Run daily briefing
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_USER_UPN: ${{ secrets.GRAPH_USER_UPN }}
        run: python3 scripts/run_daily.py
