name: Daily Teams Production Monitor

# Schedule. GitHub Actions cron is UTC-only. We run two slots ~20 minutes
# apart so the backup catches anything the primary misses (the :00 UTC slot
# was getting skipped under platform load; see scripts/run_daily.py for the
# idempotency guard that makes the second slot a no-op when the first lands).
#
#   Primary (13:15 UTC):   7:15 AM MDT / 6:15 AM MST
#   Backup  (13:35 UTC):   7:35 AM MDT / 6:35 AM MST
#
# DST shifts mean winter runs ~1 hour earlier in local time. Acceptable for
# a daily ops report.
on:
  schedule:
    - cron: "15 13 * * *"
    - cron: "35 13 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet --disable-pip-version-check requests anthropic

      - name: Run daily briefing
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_USER_UPN: ${{ secrets.GRAPH_USER_UPN }}
          # "Mark resolved" buttons in the report. Both must be set for the
          # button column to render; missing values just omit the column, so
          # the report keeps working before the Cloudflare worker is deployed.
          # See cloudflare/README.md for setup.
          CLOSE_BUTTON_WORKER_URL: ${{ secrets.CLOSE_BUTTON_WORKER_URL }}
          CLOSE_BUTTON_HMAC_SECRET: ${{ secrets.CLOSE_BUTTON_HMAC_SECRET }}
        run: python3 scripts/run_daily.py
